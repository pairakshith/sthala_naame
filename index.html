<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Google Sheets Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary-color: #1a73e8;
            --hover-color: #f1f3f4;
            --border-color: #dadce0;
            --text-dark: #202124;
            --text-muted: #5f6368;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Noto Sans Kannada', Arial, sans-serif;
            display: flex;
            flex-direction: row; /* Default side-by-side for desktop */
            height: 100vh;
            color: var(--text-dark);
            overflow: hidden;
        }

        #sidebar {
            width: 350px;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            box-shadow: 2px 0 8px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            background: var(--primary-color);
            color: white;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.3em;
            font-weight: 600;
        }

        .sidebar-header p {
            margin: 5px 0 0 0;
            font-size: 0.85em;
            opacity: 0.9;
        }

        #list-container {
            flex: 1;
            overflow-y: auto;
        }

        .sidebar-item {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
            -webkit-tap-highlight-color: transparent; /* Clean tap visual on mobile */
        }

        .sidebar-item:hover {
            background-color: var(--hover-color);
        }

        .sidebar-item.active {
            background-color: #e8f0fe;
            border-left: 4px solid var(--primary-color);
        }

        .location-title {
            font-size: 1.05em;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .location-details {
            font-size: 0.85em;
            color: var(--text-muted);
            line-height: 1.4;
        }

        #map {
            flex: 1;
            height: 100%;
        }

        .popup-card {
            min-width: 200px;
            font-family: 'Segoe UI', 'Noto Sans Kannada', sans-serif;
        }

        .popup-card h3 {
            margin: 0 0 6px 0;
            color: var(--primary-color);
            font-size: 1.1em;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
        }

        .popup-table {
            width: 100%;
            font-size: 0.9em;
            border-collapse: collapse;
            margin-top: 5px;
        }

        .popup-table td {
            padding: 4px 0;
            vertical-align: top;
        }

        .label {
            color: var(--text-muted);
            font-weight: bold;
            width: 80px;
        }

        /* =========================================================================
           MOBILE RESPONSIVE OVERRIDES (Screens smaller than 768px wide)
           ========================================================================= */
        @media (max-width: 768px) {
            body {
                flex-direction: column-reverse; /* Puts Map on top, Sidebar at the bottom */
            }

            #sidebar {
                width: 100%;
                height: 45vh; /* Takes up 45% of screen height */
                border-right: none;
                border-top: 1px solid var(--border-color);
                box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
            }

            #map {
                width: 100%;
                height: 55vh; /* Takes up 55% of screen height */
            }

            .sidebar-header {
                padding: 12px 16px; /* Slightly more compact header for small screens */
            }

            .sidebar-header h2 {
                font-size: 1.1em;
            }

            .sidebar-header p {
                font-size: 0.75em;
            }

            .sidebar-item {
                padding: 12px 16px; /* Optimized tap target area for fingers */
            }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>ಸ್ಥಳಗಳ ವಿವರ ಡ್ಯಾಶ್‌ಬೋರ್ಡ್</h2>
            <p>Direct Google Sheets Link Sync</p>
        </div>
        <div id="list-container"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const GOOGLE_SHEETS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSz1ORCSTudVSqiGX5WQ5pBJTEtsH_jNXR7hCqDVrPCXTRilObPiDJxZoe0bFmG5kUj06UjjATTVT7b/pub?gid=0&single=true&output=csv";

        // Initialize Map focusing closely on your coordinates around Kalasa/Samse region
        const map = L.map('map').setView([13.2140, 75.3300], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const listContainer = document.getElementById('list-container');
        let activeItem = null;

        Papa.parse(GOOGLE_SHEETS_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                let validPointsCount = 0;

                data.forEach((row, index) => {
                    // Case-insensitive fallback resolver
                    const normalizedRow = {};
                    Object.keys(row).forEach(key => {
                        normalizedRow[key.toLowerCase().trim()] = row[key];
                    });

                    const rawName = normalizedRow['raw'] || '';
                    const filteredName = normalizedRow['filtered'] || '';
                    const locationType = normalizedRow['type'] || '';
                    const coordinateString = normalizedRow['location'] || '';

                    const displayName = filteredName || rawName || 'ಹೆಸರಿಲ್ಲದ ಸ್ಥಳ';

                    let lat = NaN;
                    let lng = NaN;

                    if (coordinateString && coordinateString.toString().includes(',')) {
                        const parts = coordinateString.toString().split(',');
                        if (parts.length >= 2) {
                            lat = parseFloat(parts[0].trim());
                            lng = parseFloat(parts[1].trim());
                        }
                    }

                    if (!isNaN(lat) && !isNaN(lng)) {
                        validPointsCount++;

                        const marker = L.marker([lat, lng]).addTo(map);

                        const popupContent = `
                            <div class="popup-card">
                                <h3>${displayName}</h3>
                                <table class="popup-table">
                                    ${rawName ? `<tr><td class="label">ಮೂಲ ಹೆಸರು:</td><td>${rawName}</td></tr>` : ''}
                                    ${locationType ? `<tr><td class="label">ಪ್ರಕಾರ:</td><td>${locationType}</td></tr>` : ''}
                                    <tr><td class="label">ಸ್ಥಳ ಗುಣಾಂಕ:</td><td>${lat.toFixed(5)}, ${lng.toFixed(5)}</td></tr>
                                </table>
                            </div>
                        `;
                        marker.bindPopup(popupContent);

                        const item = document.createElement('div');
                        item.className = 'sidebar-item';
                        item.innerHTML = `
                            <div class="location-title">${displayName}</div>
                            <div class="location-details">
                                ${locationType ? `ಪ್ರಕಾರ: ${locationType}` : ''}
                                <div style="color:#888; font-size:0.85em; margin-top:2px;">📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}</div>
                            </div>
                        `;

                        item.addEventListener('click', () => {
                            if (activeItem) activeItem.classList.remove('active');
                            item.classList.add('active');
                            activeItem = item;

                            map.flyTo([lat, lng], 15, { animate: true, duration: 1 });
                            marker.openPopup();
                            
                            // MOBILE UX ENHANCEMENT: Smoothly scroll map back into view when an item is tapped
                            if (window.innerWidth <= 768) {
                                document.getElementById('map').scrollIntoView({ behavior: 'smooth' });
                            }
                        });

                        listContainer.appendChild(item);
                    } else {
                        console.warn(`Row ${index + 2} (${displayName}) skipped due to empty/invalid coordinates.`);
                    }
                });

                if (validPointsCount === 0) {
                    listContainer.innerHTML = `
                        <div style="padding: 20px; color: #d93025; background: #fce8e6; font-size: 0.9em;">
                            <strong>No Coordinates Found:</strong><br><br>
                            Connected to your live sheet, but could not parse values from the <code>location</code> column.
                        </div>`;
                }
            },
            error: function(err) {
                listContainer.innerHTML = `<div style="padding:20px; color:red;">Network Error: Failed to fetch live rows.</div>`;
            }
            <!DOCTYPE html>
<html>
<head>
  <title>Sthala Naame - Location Finder</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Leaflet Routing Machine CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

  <!-- Leaflet Control Geocoder -->
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    // Initialize map
    var map = L.map('map').setView([12.9716, 77.5946], 13); // Default: Bengaluru

    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Detect user location
    map.locate({setView: true, maxZoom: 16});

    // Show marker at user location
    function onLocationFound(e) {
      var radius = e.accuracy;
      L.marker(e.latlng).addTo(map)
        .bindPopup("You are within " + Math.round(radius) + " meters from here").openPopup();
      L.circle(e.latlng, radius).addTo(map);
    }
    map.on('locationfound', onLocationFound);

    // Handle location error
    function onLocationError(e) {
      alert(e.message);
    }
    map.on('locationerror', onLocationError);

    // Add search bar (Geocoder)
    L.Control.geocoder({
      defaultMarkGeocode: true
    }).addTo(map);

    // Add routing control
    L.Routing.control({
      waypoints: [],
      routeWhileDragging: true,
      geocoder: L.Control.Geocoder.nominatim()
    }).addTo(map);
  </script>
</body>
</html>
        });
    </script>
</body>
</html>
